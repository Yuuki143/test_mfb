<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0F14">
<title>⏱ ファシリタイマー</title>
<style>
/* ===== TOKENS ===== */
:root {
  --bg:          #0D0F14;
  --surf:        #161922;
  --panel:       #1E2130;
  --border:      #272B3E;
  --border-hi:   #363C58;
  --accent:      #E53935;
  --accent-dim:  rgba(229,57,53,.14);
  --accent-glow: rgba(229,57,53,.28);
  --tx1:         #ECF0FF;
  --tx2:         #7B84A3;
  --tx3:         #454D6B;
  --warn:        #F5A623;
  --danger:      #EF4444;
  --ok:          #34D399;
  --bg-warn:     rgba(245,166,35,.10);
  --bg-danger:   rgba(239,68,68,.15);
  --shadow:      0 2px 12px rgba(0,0,0,.45);
  --r:           8px;
  --topbar-h:    52px;
}
@media (prefers-color-scheme: light) { :root {
  --bg:          #F0F2F8;
  --surf:        #FFFFFF;
  --panel:       #E8EBF5;
  --border:      #CDD2E8;
  --border-hi:   #B0B9D8;
  --accent-dim:  rgba(229,57,53,.12);
  --accent-glow: rgba(229,57,53,.20);
  --tx1:         #141728;
  --tx2:         #4B5278;
  --tx3:         #9BA5C8;
  --shadow:      0 2px 8px rgba(0,0,0,.10);
}}
:root[data-theme="dark"]  {
  --bg:#0D0F14;--surf:#161922;--panel:#1E2130;--border:#272B3E;--border-hi:#363C58;
  --accent-dim:rgba(229,57,53,.14);--accent-glow:rgba(229,57,53,.28);
  --tx1:#ECF0FF;--tx2:#7B84A3;--tx3:#454D6B;--shadow:0 2px 12px rgba(0,0,0,.45);
}
:root[data-theme="light"] {
  --bg:#F0F2F8;--surf:#FFFFFF;--panel:#E8EBF5;--border:#CDD2E8;--border-hi:#B0B9D8;
  --accent-dim:rgba(229,57,53,.12);--accent-glow:rgba(229,57,53,.20);
  --tx1:#141728;--tx2:#4B5278;--tx3:#9BA5C8;--shadow:0 2px 8px rgba(0,0,0,.10);
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--tx1);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
  overscroll-behavior:none;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font:inherit;color:inherit;background:none;border:none;outline:none}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ===== UTILS ===== */
.tabular{font-variant-numeric:tabular-nums;letter-spacing:.01em}
.hidden{display:none!important}

/* ===== TOPBAR ===== */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;
  height:var(--topbar-h);
  background:var(--surf);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
#topbar .logo{
  display:flex;align-items:center;gap:8px;
  font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--tx2);white-space:nowrap;
}
#topbar .logo svg{opacity:.7;flex-shrink:0}
#topbar .spacer{flex:1}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 10px;border-radius:var(--r);
  font-size:.76rem;font-weight:600;letter-spacing:.03em;
  border:1px solid var(--border);
  color:var(--tx2);
  transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.tb-btn:hover,.tb-btn:active{background:var(--panel);color:var(--tx1);border-color:var(--border-hi)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{filter:brightness(1.12)}
/* Hide text labels on very small screens, keep icons */
@media(max-width:420px){
  .tb-label{display:none}
  .tb-btn{padding:6px 8px}
  #topbar .logo span{display:none}
}

/* ===== SETUP SCREEN ===== */
#setup-screen{
  max-width:900px;margin:0 auto;
  padding:24px 16px 80px;
  display:grid;
  grid-template-columns:1fr 268px;
  gap:20px;
  align-items:start;
}
@media(max-width:680px){
  #setup-screen{
    grid-template-columns:1fr;
    padding:16px 12px 80px;
    gap:16px;
  }
}

.section-label{
  font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--tx3);margin-bottom:10px;
}

/* Agenda list */
#agenda-list{display:flex;flex-direction:column;gap:6px}
.agenda-item{
  display:grid;
  grid-template-columns:28px 1fr auto auto auto;
  gap:6px;align-items:center;
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:10px 10px;
  transition:border-color .15s,box-shadow .15s;
  touch-action:none;
}
/* Mobile: hide owner field, stack more compactly */
@media(max-width:500px){
  .agenda-item{grid-template-columns:28px 1fr auto auto}
  .owner-input{display:none}
}
.agenda-item.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.agenda-item.dragging{opacity:.4}
.drag-handle{
  color:var(--tx3);cursor:grab;
  display:flex;align-items:center;justify-content:center;
  user-select:none;padding:4px;
}
.drag-handle:active{cursor:grabbing}
.agenda-title-input{
  background:transparent;
  font-size:.87rem;font-weight:500;
  color:var(--tx1);width:100%;min-width:0;
  padding:2px 0;
}
.agenda-title-input::placeholder{color:var(--tx3)}
.duration-input{
  width:60px;text-align:center;
  font-size:.84rem;font-weight:600;
  background:var(--panel);border:1px solid var(--border);
  border-radius:5px;padding:5px 4px;
  font-variant-numeric:tabular-nums;color:var(--tx1);
}
.duration-input:focus{border-color:var(--accent)}
.owner-input{
  width:72px;font-size:.76rem;color:var(--tx2);
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:5px 5px;
}
.owner-input::placeholder{color:var(--tx3)}
.del-btn{
  width:30px;height:30px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  color:var(--tx3);font-size:15px;transition:all .12s;
  flex-shrink:0;
}
.del-btn:hover,.del-btn:active{background:rgba(239,68,68,.15);color:var(--danger)}

#add-agenda-btn{
  margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 14px;border-radius:var(--r);
  border:1.5px dashed var(--border);
  color:var(--tx3);font-size:.84rem;font-weight:500;
  transition:all .15s;width:100%;min-height:44px;
}
#add-agenda-btn:hover,#add-agenda-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Right panel */
.right-panel{display:flex;flex-direction:column;gap:14px}

.info-card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
}
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.82rem;padding:5px 0;border-bottom:1px solid var(--border);
}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--tx2)}
.info-row .value{font-weight:600;font-variant-numeric:tabular-nums}
.info-row .value.accent{color:var(--accent)}

.preset-row{display:flex;gap:6px;flex-wrap:wrap}
#preset-select{
  flex:1;min-width:0;background:var(--panel);border:1px solid var(--border);
  border-radius:5px;padding:6px 8px;font-size:.82rem;color:var(--tx1);cursor:pointer;
}
#preset-select option{background:var(--surf);color:var(--tx1)}

.setting-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem;
}
.setting-row:last-child{border-bottom:none}
.setting-row .label{color:var(--tx2)}

.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{
  position:absolute;inset:0;border-radius:11px;
  background:var(--border);cursor:pointer;transition:background .2s;
}
.toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-track::after{
  content:'';position:absolute;
  width:16px;height:16px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .2s;
}
.toggle input:checked+.toggle-track::after{transform:translateX(16px)}

.mini-select{
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;padding:4px 6px;font-size:.76rem;color:var(--tx1);cursor:pointer;
}

#start-btn{
  width:100%;padding:16px;border-radius:var(--r);
  background:var(--accent);color:#fff;
  font-size:.95rem;font-weight:700;letter-spacing:.05em;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:filter .15s,transform .1s;
  box-shadow:0 4px 20px rgba(91,158,255,.35);
  min-height:52px;
}
#start-btn:hover{filter:brightness(1.1)}
#start-btn:active{transform:scale(.98)}

.io-row{display:flex;gap:6px}
.io-btn{
  flex:1;padding:9px;border-radius:5px;font-size:.76rem;font-weight:600;
  border:1px solid var(--border);color:var(--tx2);transition:all .12s;min-height:40px;
}
.io-btn:hover,.io-btn:active{background:var(--panel);color:var(--tx1)}

/* ===== RUNNING SCREEN ===== */
#running-screen{
  display:flex;flex-direction:column;
  min-height:calc(100dvh - var(--topbar-h));
}

#progress-bar-wrap{height:3px;background:var(--border);position:relative;overflow:hidden;flex-shrink:0}
#progress-bar-fill{
  height:100%;background:var(--accent);
  transition:width .5s linear,background .3s;position:relative;
}
#progress-bar-fill::after{
  content:'';position:absolute;right:0;top:0;
  width:8px;height:100%;background:rgba(255,255,255,.6);border-radius:0 2px 2px 0;
}

#agenda-breadcrumb{
  display:flex;align-items:center;
  overflow-x:auto;padding:8px 16px;
  background:var(--surf);border-bottom:1px solid var(--border);
  scrollbar-width:none;flex-shrink:0;
}
#agenda-breadcrumb::-webkit-scrollbar{display:none}
.bc-item{
  display:flex;align-items:center;gap:6px;
  font-size:.72rem;padding:4px 8px;border-radius:4px;
  color:var(--tx3);white-space:nowrap;flex-shrink:0;transition:all .15s;cursor:pointer;
}
.bc-item.done{color:var(--ok);text-decoration:line-through;text-decoration-color:rgba(52,211,153,.4)}
.bc-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.bc-item.active::before{content:'▶';font-size:.55rem}
.bc-sep{color:var(--border-hi);font-size:.7rem;flex-shrink:0}

#timer-main{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;padding:24px 20px 20px;
  transition:background .4s;
}
#timer-main.state-warn{background:var(--bg-warn)}
#timer-main.state-danger{background:var(--bg-danger)}

#current-title{
  font-size:clamp(.9rem,3vw,1.2rem);font-weight:600;letter-spacing:.02em;
  color:var(--tx2);text-align:center;max-width:600px;
  text-wrap:balance;
}
#current-owner{color:var(--tx3);font-size:.8rem;margin-top:2px;text-align:center}

#timer-display{
  font-size:clamp(72px,20vw,200px);
  font-weight:800;letter-spacing:-.03em;
  font-variant-numeric:tabular-nums;
  line-height:1;color:var(--tx1);transition:color .3s;
  user-select:none;
}
#timer-display.state-warn{color:var(--warn)}
#timer-display.state-danger{color:var(--danger)}
#timer-display.overtime::before{
  content:'+';font-size:.55em;opacity:.7;
  vertical-align:top;margin-top:.15em;margin-right:.02em;
}

#status-badge{
  font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;
  background:var(--panel);color:var(--tx3);transition:all .2s;
}
#status-badge.running{background:rgba(52,211,153,.15);color:var(--ok)}
#status-badge.paused{background:var(--panel);color:var(--tx2)}
#status-badge.warn{background:rgba(245,166,35,.2);color:var(--warn)}
#status-badge.danger{background:rgba(239,68,68,.2);color:var(--danger)}

#controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{
  width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:1px solid var(--border);background:var(--surf);
  color:var(--tx2);transition:all .12s;flex-shrink:0;
}
.ctrl-btn:hover,.ctrl-btn:active{background:var(--panel);color:var(--tx1);border-color:var(--border-hi)}
.ctrl-btn.main-ctrl{
  width:68px;height:68px;border-radius:14px;font-size:28px;
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 4px 16px rgba(91,158,255,.35);
}
.ctrl-btn.main-ctrl:hover{filter:brightness(1.12)}
.ctrl-btn.main-ctrl.is-running{background:var(--ok);border-color:var(--ok);box-shadow:0 4px 16px rgba(52,211,153,.3)}
.ext-btn{
  padding:10px 16px;border-radius:10px;
  font-size:.8rem;font-weight:600;letter-spacing:.03em;
  border:1px solid var(--border);background:var(--surf);
  color:var(--tx2);transition:all .12s;min-height:44px;
}
.ext-btn:hover,.ext-btn:active{background:var(--panel);color:var(--tx1)}

@media(max-width:400px){
  .ctrl-btn{width:44px;height:44px;font-size:18px;border-radius:10px}
  .ctrl-btn.main-ctrl{width:58px;height:58px;font-size:24px}
  .ext-btn{padding:8px 12px;font-size:.76rem}
  #controls{gap:7px}
}

#kbd-hint{
  text-align:center;font-size:.66rem;color:var(--tx3);
  padding:4px;letter-spacing:.04em;
}
@media(max-width:600px){#kbd-hint{display:none}}
kbd{
  background:var(--panel);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;font-size:.62rem;font-family:inherit;color:var(--tx3);
}

/* Bottom context */
#timer-bottom{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:var(--surf);border-top:1px solid var(--border);flex-shrink:0;
}
@media(max-width:500px){
  #timer-bottom{grid-template-columns:repeat(2,1fr)}
  .bottom-cell:nth-child(2){border-right:none}
}
.bottom-cell{padding:12px 14px;border-right:1px solid var(--border)}
.bottom-cell:last-child{border-right:none}
.bottom-cell .cell-label{
  font-size:.62rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--tx3);margin-bottom:3px;
}
.bottom-cell .cell-value{font-size:.85rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--tx2)}
.bottom-cell .cell-value.next-title{font-weight:500;font-size:.82rem;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Finish overlay */
#finish-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(13,15,20,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:20px;text-align:center;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#finish-overlay .fin-emoji{font-size:64px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
#finish-overlay h2{font-size:1.8rem;font-weight:800;color:var(--tx1)}
#finish-overlay p{color:var(--tx2);font-size:.9rem}
#finish-overlay .fin-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}

/* Import modal */
#import-modal{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;
}
@media(min-width:600px){
  #import-modal{align-items:center;padding:20px}
}
.modal-box{
  background:var(--surf);border:1px solid var(--border);
  border-radius:12px 12px 0 0;
  padding:20px;width:100%;max-width:480px;
}
@media(min-width:600px){.modal-box{border-radius:12px}}
.modal-box h3{font-size:1rem;font-weight:700;margin-bottom:12px}
.modal-box textarea{
  width:100%;height:140px;resize:none;
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px;font-size:.78rem;font-family:monospace;color:var(--tx1);outline:none;
}
.modal-box textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.modal-btn{
  padding:10px 18px;border-radius:6px;font-size:.82rem;font-weight:600;
  border:1px solid var(--border);color:var(--tx2);transition:all .12s;min-height:40px;
}
.modal-btn:hover,.modal-btn:active{background:var(--panel);color:var(--tx1)}
.modal-btn.ok{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-btn.ok:hover{filter:brightness(1.1)}

@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 4v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span>ファシリタイマー</span>
  </div>
  <div class="spacer"></div>
  <button class="tb-btn" id="theme-btn" title="テーマ切替">🌙</button>
  <button class="tb-btn" id="sound-toggle-btn">🔔<span class="tb-label"> 音あり</span></button>
  <button class="tb-btn" id="fullscreen-btn" title="フルスクリーン">⛶</button>
  <button class="tb-btn primary hidden" id="back-to-setup-btn">← <span class="tb-label">編集</span></button>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div>
    <div class="section-label">アジェンダ</div>
    <div id="agenda-list"></div>
    <button id="add-agenda-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      アジェンダを追加
    </button>
  </div>

  <div class="right-panel">
    <div class="info-card">
      <div class="section-label">サマリ</div>
      <div class="info-row"><span class="label">アジェンダ数</span><span class="value accent" id="summary-count">0 件</span></div>
      <div class="info-row"><span class="label">合計時間</span><span class="value accent" id="summary-total">00:00</span></div>
      <div class="info-row"><span class="label">予定終了</span><span class="value" id="summary-end">--:--</span></div>
    </div>

    <div class="info-card">
      <div class="section-label">プリセット</div>
      <div class="preset-row">
        <select id="preset-select"><option value="">— プリセットを選択 —</option></select>
        <button class="tb-btn" id="load-preset-btn">↓ 読込</button>
        <button class="tb-btn" id="del-preset-btn">✕</button>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <input id="preset-name-input" type="text" placeholder="プリセット名"
          style="flex:1;min-width:0;background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:7px 8px;font-size:.82rem;color:var(--tx1)">
        <button class="tb-btn" id="save-preset-btn">💾 保存</button>
      </div>
    </div>

    <div class="info-card">
      <div class="section-label">設定</div>
      <div class="setting-row">
        <span class="label">自動で次へ進む</span>
        <label class="toggle"><input type="checkbox" id="auto-advance-chk" checked><span class="toggle-track"></span></label>
      </div>
      <div class="setting-row">
        <span class="label">アラート音</span>
        <select class="mini-select" id="sound-type-sel">
          <option value="bell">ベル</option>
          <option value="chime">チャイム</option>
          <option value="applause">拍手</option>
        </select>
      </div>
    </div>

    <div class="info-card">
      <div class="section-label">インポート / エクスポート</div>
      <div class="io-row">
        <button class="io-btn" id="import-btn">📥 JSON読込</button>
        <button class="io-btn" id="export-btn">📤 JSON出力</button>
      </div>
    </div>

    <button id="start-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 2.5l10 5.5-10 5.5V2.5z" fill="currentColor"/>
      </svg>
      会議を開始
    </button>
  </div>
</div>

<!-- RUNNING SCREEN -->
<div id="running-screen" class="hidden">
  <div id="progress-bar-wrap"><div id="progress-bar-fill" style="width:0%"></div></div>
  <div id="agenda-breadcrumb"></div>

  <div id="timer-main">
    <div style="text-align:center">
      <div id="current-title">—</div>
      <div id="current-owner"></div>
    </div>

      <button class="ctrl-btn" id="prev-btn" title="前のアジェンダ">⏮</button>

      <button class="ctrl-btn" id="next-btn" title="次のアジェンダ">⏭</button>

      <button class="ext-btn" id="add1m-btn">+1分</button>

    </div>

      <kbd>Space</kbd> 再生/停止 &nbsp;
      <kbd>←</kbd><kbd>→</kbd> 前後 &nbsp;
      <kbd>+</kbd> 1分追加
    </div>
  </div>

  <div id="timer-bottom">
    <div class="bottom-cell">
      <div class="cell-label">次のアジェンダ</div>
      <div class="cell-value next-title" id="next-title">—</div>
    </div>
    <div class="bottom-cell">
      <div class="cell-label">次の時間</div>
      <div class="cell-value" id="next-dur">—</div>
    </div>
    <div class="bottom-cell">
      <div class="cell-label">会議 経過</div>
      <div class="cell-value tabular" id="total-elapsed">00:00</div>
    </div>
    <div class="bottom-cell">
      <div class="cell-label">予定終了</div>
      <div class="cell-value tabular" id="end-time-display">—</div>
    </div>
  </div>
</div>

<!-- FINISH OVERLAY -->
<div id="finish-overlay" class="hidden">
  <div class="fin-emoji">🎉</div>
  <h2>会議終了！</h2>
  <p id="finish-summary">お疲れさまでした</p>
  <div class="fin-actions">
    <button class="modal-btn ok" id="finish-restart-btn">もう一度</button>
    <button class="modal-btn" id="finish-edit-btn">編集画面へ</button>
  </div>
</div>

<!-- IMPORT MODAL -->
<div id="import-modal" class="hidden">
  <div class="modal-box">
    <h3>JSONインポート</h3>
    <textarea id="import-textarea" placeholder='[{"title":"アジェンダ名","durationSec":300,"owner":"担当者"}]'></textarea>
    <div class="modal-actions">
      <button class="modal-btn" id="import-cancel-btn">キャンセル</button>
      <button class="modal-btn ok" id="import-ok-btn">インポート</button>
    </div>
  </div>
</div>

<script>
const state = {
  view: 'setup',
  agendas: [
    {id:uid(),title:'アイスブレイク',durationSec:300,owner:''},
    {id:uid(),title:'共有',durationSec:600,owner:''},
    {id:uid(),title:'議論',durationSec:1200,owner:''},
    {id:uid(),title:'まとめ',durationSec:300,owner:''},
  ],
  presets: [],
  settings: { soundEnabled:true, soundType:'bell', autoAdvance:true, theme:'dark' },
  timer: { status:'idle', currentIndex:0, remainingSec:0, isOvertime:false, overtimeSec:0 },
  _rafId:null, _lastTs:null, _meetingStartTs:null,
  _alerted:new Set(), _scheduledEnd:null,
};

function uid(){ return Math.random().toString(36).slice(2,9) }

// --- Persistence ---
function saveAll(){
  localStorage.setItem('facili_agendas', JSON.stringify(state.agendas));
  localStorage.setItem('facili_presets', JSON.stringify(state.presets));
  localStorage.setItem('facili_settings', JSON.stringify(state.settings));
  const t = state.timer;
  localStorage.setItem('facili_session', JSON.stringify({
    status: t.status==='running'?'paused':t.status,
    currentIndex:t.currentIndex, remainingSec:t.remainingSec,
    isOvertime:t.isOvertime, overtimeSec:t.overtimeSec, view:state.view,
  }));
}

function loadAll(){
  try {
    const a=localStorage.getItem('facili_agendas'); if(a) state.agendas=JSON.parse(a);
    const p=localStorage.getItem('facili_presets'); if(p) state.presets=JSON.parse(p);
    const s=localStorage.getItem('facili_settings'); if(s) Object.assign(state.settings,JSON.parse(s));
    const sess=localStorage.getItem('facili_session');
    if(sess){ const d=JSON.parse(sess); Object.assign(state.timer,d); if(d.view==='running') state.view='running'; }
  } catch(e){}
}

// --- Audio ---
let audioCtx=null;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playBell(freq=880,dur=2){
  const ctx=getAC(), osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type='sine'; osc.frequency.value=freq;
  gain.gain.setValueAtTime(.4,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  osc.start(); osc.stop(ctx.currentTime+dur);
}
function playChime(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playBell(f,1.5),i*120)); }
function playApplause(){
  const ctx=getAC();
  const buf=ctx.createBuffer(1,ctx.sampleRate*1.5,ctx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource(), flt=ctx.createBiquadFilter(), gain=ctx.createGain();
  flt.type='bandpass'; flt.frequency.value=2000; flt.Q.value=.8;
  src.buffer=buf; src.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(.3,ctx.currentTime+.3);
  gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
  src.start(); src.stop(ctx.currentTime+1.5);
}
function playAlert(){
  if(!state.settings.soundEnabled) return;
  try { const t=state.settings.soundType; if(t==='bell') playBell(); else if(t==='chime') playChime(); else playApplause(); } catch(e){}
}
function playFinish(){
  if(!state.settings.soundEnabled) return;
  try { playChime(); setTimeout(()=>playChime(),600); } catch(e){}
}

// --- Format ---
function fmtSec(sec){
  const a=Math.abs(Math.round(sec));
  return `${Math.floor(a/60).toString().padStart(2,'0')}:${(a%60).toString().padStart(2,'0')}`;
}
function fmtTime(d){ return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

// --- Timer ---
function startTimer(){
  if(state.timer.status==='running'||!state.agendas.length) return;
  if(state.timer.status==='idle'){
    state.timer.currentIndex=0;
    state.timer.remainingSec=state.agendas[0].durationSec;
    state.timer.isOvertime=false; state.timer.overtimeSec=0;
    state._alerted=new Set(); state._meetingStartTs=performance.now();
    const total=state.agendas.reduce((a,ag)=>a+ag.durationSec,0);
    const end=new Date(Date.now()+total*1000);
    state._scheduledEnd=end;
    document.getElementById('end-time-display').textContent=fmtTime(end);
  }
  state.timer.status='running'; state._lastTs=performance.now(); tick();
}

function pauseTimer(){
  state.timer.status='paused';
  if(state._rafId){ cancelAnimationFrame(state._rafId); state._rafId=null; }
}

function tick(){
  const now=performance.now();
  const dt=(now-(state._lastTs||now))/1000;
  state._lastTs=now;
  if(state.timer.status==='running'){
    if(!state.timer.isOvertime){
      state.timer.remainingSec-=dt;
      checkAlerts();
      if(state.timer.remainingSec<=0){ state.timer.remainingSec=0; handleAgendaEnd(); }
    } else { state.timer.overtimeSec+=dt; }
  }
  renderRunning();
  if(state.timer.status==='running') state._rafId=requestAnimationFrame(tick);
  saveAll();
}

function checkAlerts(){
  const rem=state.timer.remainingSec, k=`${state.timer.currentIndex}`;
  if(rem<=60&&!state._alerted.has(k+'60')){ state._alerted.add(k+'60'); playAlert(); }
  if(rem<=30&&!state._alerted.has(k+'30')){ state._alerted.add(k+'30'); playAlert(); }
}

function handleAgendaEnd(){
  const idx=state.timer.currentIndex;
  if(!state._alerted.has(`${idx}_end`)){ state._alerted.add(`${idx}_end`); playAlert(); }
  if(state.settings.autoAdvance){
    const next=idx+1;
    if(next<state.agendas.length) goToAgenda(next);
    else finishMeeting();
  } else { state.timer.isOvertime=true; state.timer.overtimeSec=0; }
}

function finishMeeting(){
  state.timer.status='finished';
  if(state._rafId){ cancelAnimationFrame(state._rafId); state._rafId=null; }
  playFinish();
  const elapsed=state._meetingStartTs?(performance.now()-state._meetingStartTs)/1000:0;
  document.getElementById('finish-summary').textContent=`総経過時間: ${fmtSec(elapsed)} — お疲れさまでした`;
  document.getElementById('finish-overlay').classList.remove('hidden');
  saveAll();
}

function goToAgenda(idx){
  if(idx<0||idx>=state.agendas.length) return;
  state.timer.currentIndex=idx;
  state.timer.remainingSec=state.agendas[idx].durationSec;
  state.timer.isOvertime=false; state.timer.overtimeSec=0;
}

function skipNext(){ const n=state.timer.currentIndex+1; if(n>=state.agendas.length){finishMeeting();return;} goToAgenda(n); if(state.timer.status==='idle') state.timer.status='running'; }
function skipPrev(){ const p=state.timer.currentIndex-1; if(p>=0) goToAgenda(p); }
function addTime(sec){ state.timer.remainingSec+=sec; if(state.timer.isOvertime){state.timer.isOvertime=false;state.timer.overtimeSec=0;} }

// --- Render ---
function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }
function parseDuration(str){
  str=str.trim();
  if(str.includes(':')){ const[m,s]=str.split(':').map(x=>parseInt(x)||0); return m*60+s; }
  return (parseInt(str)||0)*60;
}

let dragSrcIdx=null;

function renderSetup(){
  const list=document.getElementById('agenda-list');
  list.innerHTML='';
  state.agendas.forEach((ag,i)=>{
    const div=document.createElement('div');
    div.className='agenda-item'; div.draggable=true; div.dataset.idx=i;
    div.innerHTML=`
      <div class="drag-handle">
        <svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor">
          <rect y="0" width="10" height="2" rx="1"/>
          <rect y="6" width="10" height="2" rx="1"/>
          <rect y="12" width="10" height="2" rx="1"/>
        </svg>
      </div>
      <input class="agenda-title-input" type="text" inputmode="text" placeholder="アジェンダタイトル" value="${esc(ag.title)}">
      <input class="duration-input" type="text" inputmode="numeric" placeholder="05:00" value="${fmtSec(ag.durationSec)}">
      <input class="owner-input" type="text" inputmode="text" placeholder="担当者" value="${esc(ag.owner||'')}">
      <button class="del-btn" aria-label="削除">✕</button>
    `;
    div.querySelector('.agenda-title-input').addEventListener('input',e=>{ag.title=e.target.value;updateSummary();saveAll()});
    div.querySelector('.duration-input').addEventListener('blur',e=>{ag.durationSec=parseDuration(e.target.value);e.target.value=fmtSec(ag.durationSec);updateSummary();saveAll()});
    div.querySelector('.duration-input').addEventListener('keydown',e=>{ if(e.key==='Enter') e.target.blur(); });
    div.querySelector('.owner-input').addEventListener('input',e=>{ag.owner=e.target.value;saveAll()});
    div.querySelector('.del-btn').addEventListener('click',()=>{state.agendas.splice(i,1);renderSetup();saveAll()});
    // Drag & drop
    div.addEventListener('dragstart',e=>{dragSrcIdx=i;e.dataTransfer.effectAllowed='move';div.classList.add('dragging')});
    div.addEventListener('dragend',()=>{div.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'))});
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over')});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{
      e.preventDefault(); div.classList.remove('drag-over');
      if(dragSrcIdx===null||dragSrcIdx===i) return;
      const[item]=state.agendas.splice(dragSrcIdx,1);
      state.agendas.splice(i,0,item);
      dragSrcIdx=null; renderSetup(); saveAll();
    });
    // Touch drag (long press → reorder via move)
    let touchDragTimer=null, touchStartY=0;
    div.addEventListener('touchstart',e=>{
      touchStartY=e.touches[0].clientY;
      touchDragTimer=setTimeout(()=>{div.classList.add('dragging');dragSrcIdx=i;},400);
    },{passive:true});
    div.addEventListener('touchmove',e=>{
      if(dragSrcIdx===null){clearTimeout(touchDragTimer);return;}
      e.preventDefault();
      const y=e.touches[0].clientY;
      const els=[...document.querySelectorAll('.agenda-item')];
      els.forEach(el=>el.classList.remove('drag-over'));
      const target=els.find(el=>{const r=el.getBoundingClientRect();return y>=r.top&&y<=r.bottom});
      if(target) target.classList.add('drag-over');
    },{passive:false});
    div.addEventListener('touchend',e=>{
      clearTimeout(touchDragTimer);
      if(dragSrcIdx===null){return;}
      const y=e.changedTouches[0].clientY;
      const els=[...document.querySelectorAll('.agenda-item')];
      const toEl=els.find(el=>{const r=el.getBoundingClientRect();return y>=r.top&&y<=r.bottom});
      const toIdx=toEl?parseInt(toEl.dataset.idx):null;
      if(toIdx!==null&&toIdx!==dragSrcIdx){
        const[item]=state.agendas.splice(dragSrcIdx,1);
        state.agendas.splice(toIdx,0,item);
      }
      dragSrcIdx=null; div.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
      renderSetup(); saveAll();
    });
    list.appendChild(div);
  });
  updateSummary(); updatePresetSelect();
  document.getElementById('auto-advance-chk').checked=state.settings.autoAdvance;
  document.getElementById('sound-type-sel').value=state.settings.soundType;
}

function updateSummary(){
  const total=state.agendas.reduce((a,ag)=>a+ag.durationSec,0);
  document.getElementById('summary-count').textContent=`${state.agendas.length} 件`;
  document.getElementById('summary-total').textContent=fmtSec(total);
  document.getElementById('summary-end').textContent=total>0?fmtTime(new Date(Date.now()+total*1000)):'--:--';
}

function updatePresetSelect(){
  const sel=document.getElementById('preset-select');
  const val=sel.value;
  sel.innerHTML='<option value="">— プリセットを選択 —</option>';
  state.presets.forEach(p=>{
    const opt=document.createElement('option'); opt.value=p.id; opt.textContent=p.name; sel.appendChild(opt);
  });
  if(val) sel.value=val;
}

function renderRunning(){
  const {currentIndex,remainingSec,isOvertime,overtimeSec,status}=state.timer;
  const ag=state.agendas[currentIndex]; if(!ag) return;

  document.getElementById('current-title').textContent=ag.title;
  document.getElementById('current-owner').textContent=ag.owner?`担当: ${ag.owner}`:'';

  const td=document.getElementById('timer-display');
  td.textContent=fmtSec(isOvertime?overtimeSec:remainingSec);
  td.classList.toggle('overtime',isOvertime);
  td.classList.remove('state-warn','state-danger');

  const main=document.getElementById('timer-main');
  main.classList.remove('state-warn','state-danger');

  const badge=document.getElementById('status-badge');
  badge.className=''; badge.id='status-badge';

  if(isOvertime){
    main.classList.add('state-danger'); td.classList.add('state-danger');
    badge.textContent='超過中'; badge.classList.add('danger');
  } else if(remainingSec<=30){
    main.classList.add('state-danger'); td.classList.add('state-danger');
    badge.textContent='残り30秒'; badge.classList.add('danger');
  } else if(remainingSec<=60){
    main.classList.add('state-warn'); td.classList.add('state-warn');
    badge.textContent='残り1分'; badge.classList.add('warn');
  } else if(status==='running'){
    badge.textContent='進行中'; badge.classList.add('running');
  } else if(status==='paused'){
    badge.textContent='一時停止'; badge.classList.add('paused');
  } else {
    badge.textContent='待機中';
  }

  const ppBtn=document.getElementById('play-pause-btn');
  ppBtn.textContent=status==='running'?'⏸':'▶';
  ppBtn.classList.toggle('is-running', status==='running');

  const total=state.agendas.reduce((a,ag)=>a+ag.durationSec,0);
  const done=state.agendas.slice(0,currentIndex).reduce((a,ag)=>a+ag.durationSec,0);
  const pct=total>0?Math.min(100,(done+ag.durationSec-remainingSec)/total*100):0;
  const bar=document.getElementById('progress-bar-fill');
  bar.style.width=pct+'%';
  bar.style.background=isOvertime?'var(--danger)':remainingSec<=30?'var(--danger)':remainingSec<=60?'var(--warn)':'var(--accent)';

  // Breadcrumb
  const bc=document.getElementById('agenda-breadcrumb'); bc.innerHTML='';
  state.agendas.forEach((a2,i)=>{
    if(i>0){const sep=document.createElement('span');sep.className='bc-sep';sep.textContent='›';bc.appendChild(sep);}
    const item=document.createElement('div');
    item.className='bc-item'+(i<currentIndex?' done':i===currentIndex?' active':'');
    item.textContent=`${a2.title} (${fmtSec(a2.durationSec)})`;
    item.addEventListener('click',()=>{ if(state.timer.status!=='idle') goToAgenda(i); });
    bc.appendChild(item);
  });
  const active=bc.querySelector('.active');
  if(active) active.scrollIntoView({inline:'center',behavior:'smooth'});

  const next=state.agendas[currentIndex+1];
  document.getElementById('next-title').textContent=next?next.title:'（最後のアジェンダ）';
  document.getElementById('next-dur').textContent=next?fmtSec(next.durationSec):'—';

  if(state._meetingStartTs){
    document.getElementById('total-elapsed').textContent=fmtSec((performance.now()-state._meetingStartTs)/1000);
  }
}

// --- Views ---
function showSetup(){
  state.view='setup';
  document.getElementById('setup-screen').classList.remove('hidden');
  document.getElementById('running-screen').classList.add('hidden');
  document.getElementById('back-to-setup-btn').classList.add('hidden');
  state.timer.status='idle'; state.timer.currentIndex=0; state.timer.remainingSec=0; state.timer.isOvertime=false;
  if(state._rafId){cancelAnimationFrame(state._rafId);state._rafId=null;}
  renderSetup(); saveAll();
}

function showRunning(){
  if(!state.agendas.length){alert('アジェンダを1件以上追加してください');return;}
  state.view='running';
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('running-screen').classList.remove('hidden');
  document.getElementById('back-to-setup-btn').classList.remove('hidden');
  document.getElementById('finish-overlay').classList.add('hidden');
  state.timer.status='idle'; state.timer.currentIndex=0;
  state.timer.remainingSec=state.agendas[0].durationSec;
  state.timer.isOvertime=false; state._alerted=new Set(); state._meetingStartTs=null;
  const total=state.agendas.reduce((a,ag)=>a+ag.durationSec,0);
  const end=new Date(Date.now()+total*1000);
  state._scheduledEnd=end;
  document.getElementById('end-time-display').textContent=fmtTime(end);
  renderRunning();
}

// --- Events ---
document.getElementById('start-btn').addEventListener('click',showRunning);
document.getElementById('back-to-setup-btn').addEventListener('click',showSetup);
document.getElementById('finish-edit-btn').addEventListener('click',()=>{document.getElementById('finish-overlay').classList.add('hidden');showSetup()});
document.getElementById('finish-restart-btn').addEventListener('click',()=>{document.getElementById('finish-overlay').classList.add('hidden');showRunning()});

document.getElementById('play-pause-btn').addEventListener('click',()=>{
  try{getAC().resume()}catch(e){}
  if(state.timer.status==='running') pauseTimer(); else startTimer();
});
document.getElementById('prev-btn').addEventListener('click',()=>{skipPrev();renderRunning()});
document.getElementById('next-btn').addEventListener('click',()=>{skipNext();renderRunning()});
document.getElementById('add30s-btn').addEventListener('click',()=>{addTime(30);renderRunning()});
document.getElementById('add1m-btn').addEventListener('click',()=>{addTime(60);renderRunning()});
document.getElementById('reset-btn').addEventListener('click',()=>{
  const ag=state.agendas[state.timer.currentIndex];
  if(ag){state.timer.remainingSec=ag.durationSec;state.timer.isOvertime=false;state.timer.overtimeSec=0;}
  renderRunning();
});

document.getElementById('add-agenda-btn').addEventListener('click',()=>{
  state.agendas.push({id:uid(),title:'',durationSec:300,owner:''});
  renderSetup(); saveAll();
  const inputs=document.querySelectorAll('.agenda-title-input');
  if(inputs.length) inputs[inputs.length-1].focus();
});

document.getElementById('save-preset-btn').addEventListener('click',()=>{
  const name=document.getElementById('preset-name-input').value.trim();
  if(!name){alert('プリセット名を入力してください');return;}
  const ex=state.presets.find(p=>p.name===name);
  if(ex) ex.agendas=JSON.parse(JSON.stringify(state.agendas));
  else state.presets.push({id:uid(),name,agendas:JSON.parse(JSON.stringify(state.agendas)),createdAt:new Date().toISOString()});
  saveAll(); updatePresetSelect(); document.getElementById('preset-name-input').value='';
});
document.getElementById('load-preset-btn').addEventListener('click',()=>{
  const id=document.getElementById('preset-select').value; if(!id) return;
  const p=state.presets.find(x=>x.id===id); if(!p) return;
  state.agendas=JSON.parse(JSON.stringify(p.agendas)); renderSetup(); saveAll();
});
document.getElementById('del-preset-btn').addEventListener('click',()=>{
  const id=document.getElementById('preset-select').value; if(!id) return;
  state.presets=state.presets.filter(x=>x.id!==id); saveAll(); updatePresetSelect();
});

document.getElementById('export-btn').addEventListener('click',()=>{
  const json=JSON.stringify(state.agendas.map(({title,durationSec,owner,note})=>({title,durationSec,owner,note})),null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='agendas.json'; a.click();
});
document.getElementById('import-btn').addEventListener('click',()=>{
  document.getElementById('import-modal').classList.remove('hidden');
  document.getElementById('import-textarea').value='';
});
document.getElementById('import-cancel-btn').addEventListener('click',()=>document.getElementById('import-modal').classList.add('hidden'));
document.getElementById('import-ok-btn').addEventListener('click',()=>{
  try{
    const data=JSON.parse(document.getElementById('import-textarea').value);
    if(!Array.isArray(data)) throw new Error();
    state.agendas=data.map(d=>({id:uid(),title:d.title||'',durationSec:d.durationSec||300,owner:d.owner||'',note:d.note||''}));
    document.getElementById('import-modal').classList.add('hidden');
    renderSetup(); saveAll();
  }catch(e){alert('JSONの形式が正しくありません');}
});

document.getElementById('sound-toggle-btn').addEventListener('click',()=>{
  state.settings.soundEnabled=!state.settings.soundEnabled;
  document.getElementById('sound-toggle-btn').innerHTML=state.settings.soundEnabled
    ?'🔔<span class="tb-label"> 音あり</span>':'🔕<span class="tb-label"> ミュート</span>';
  saveAll();
});
document.getElementById('theme-btn').addEventListener('click',()=>{
  state.settings.theme=state.settings.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=state.settings.theme;
  document.getElementById('theme-btn').textContent=state.settings.theme==='dark'?'🌙':'☀️';
  document.querySelector('meta[name="theme-color"]').content=state.settings.theme==='dark'?'#0D0F14':'#F0F2F8';
  saveAll();
});
document.getElementById('fullscreen-btn').addEventListener('click',()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
});
document.getElementById('auto-advance-chk').addEventListener('change',e=>{state.settings.autoAdvance=e.target.checked;saveAll()});
document.getElementById('sound-type-sel').addEventListener('change',e=>{state.settings.soundType=e.target.value;saveAll()});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if(state.view!=='running') return;
  if(e.key===' '||e.code==='Space'){
    e.preventDefault(); try{getAC().resume()}catch(ee){}
    if(state.timer.status==='running') pauseTimer(); else startTimer();
    renderRunning();
  }
  if(e.key==='ArrowRight'){e.preventDefault();skipNext();renderRunning()}
  if(e.key==='ArrowLeft'){e.preventDefault();skipPrev();renderRunning()}
  if(e.key==='+'||e.key==='='){e.preventDefault();addTime(60);renderRunning()}
});

// --- Init ---
loadAll();
document.documentElement.dataset.theme=state.settings.theme;
document.getElementById('theme-btn').textContent=state.settings.theme==='dark'?'🌙':'☀️';
document.getElementById('sound-toggle-btn').innerHTML=state.settings.soundEnabled
  ?'🔔<span class="tb-label"> 音あり</span>':'🔕<span class="tb-label"> ミュート</span>';
document.getElementById('auto-advance-chk').checked=state.settings.autoAdvance;
document.getElementById('sound-type-sel').value=state.settings.soundType;

if(state.view==='running'){
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('running-screen').classList.remove('hidden');
  document.getElementById('back-to-setup-btn').classList.remove('hidden');
  renderRunning();
} else {
  renderSetup();
}
</script>
</body>
</html>
